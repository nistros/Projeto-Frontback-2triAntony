<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>
  <style>
h2 {
  text-align: center;
  width: 300px fit-content; /* ou uma largura fixa tipo 300px */
  margin: 0 auto;
}
    body {
      font-family: Arial, sans-serif;
      background-color: #c7f4ff;
      margin: 0;
      padding: 0;
    }

    .caixa {
      width: 300px;
      margin: 80px auto;
      background-color: white;
      padding: 12px;
      border-radius: 30px;
      box-shadow: 10px 10px 10px rgba(0, 0, 0, 1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 100px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    button {
      background-color: #76d234e0;
      color: rgb(255, 255, 255);
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #c646b7;
    }
  .carlos{
    background-color: blue;
  }
  </style>
</head>
<body>
    <h2>Título centralizado/ os aviso ai</h2>  
    <p1><b> é os aviso né rapaziada, seloko quanto aviso aqui nesse parágrafo</b></p1>
    <div class="caixa">
    <h1>Entrar</h1>
    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">
    <button>Login</button>
</div>
<button  class="carlos">Login</button>
</body>
</html>
